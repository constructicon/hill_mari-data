1:
  name: 'V / V-da'
  formula_gloss: 'V.IMP / V-IMP.2PL'
  illustration: "kn'igä-m juk dono lə̑t-Ø."
  illustration_gloss_russian: 'книга голос с читать-IMP'
  illustration_gloss_english: 'book-ACC voice with read-IMP'
  illustration_translation_russian: '‘Читай книгу вслух’.'
  illustration_translation_english: '‘Read the book out loud’.'
  definitions:
    - russian: |
         Конструкция выражает побуждение выполнить некоторое действие. Это побуждение обращено к собеседнику.
    - english: |
         This construction is used to express causation to perform an action. This causation is directed towards the addressee.
  examples:
    - |
         nu kə̑ce mə̑št-et tenge šajə̑š-Ø.
    - |
         “mə̈n' toša-em-ə̈n-äm vekät, mə̈n'-ə̈m ə̈nde šə̑pš-ə̑n lə̑k-da”, - man-eš v'in'n'i pux.
    - |
         t'ot'a man-eš: “vaštə̑l-da, vaštə̑l-da”, - man-eš.
  examples_glosses_russian:
    - |
         ну как уметь-NPST.2SG так говорить-IMP
    - |
         я худой-INCH-PRET-1SG вероятно я-ACC теперь тянуть-CVB извлекать-IMP.2PL говорить-NPST.3SG Винни-Пух
    - |
         дедушка говорить-NPST.3SG смеяться-IMP.2PL смеяться-IMP.2PL говорить-NPST.3SG
  examples_glosses_english:
    - |
         well how be_able-NPST.2SG this_way say-IMP
    - |
         I thin-INCH-PRET-1SG probably I-ACC now pull-CVB extract-IMP.2PL say-NPST.3SG Winnie-the-Pooh
    - |
         grandfather say-NPST.3SG laugh-IMP.2PL laugh-IMP.2PL say-NPST.3SG
  examples_translation_russian:
    - |
         ‘Ну, как умеешь, так и говори’.
    - |
         ‘«Я, наверно, похудел, теперь вытащите меня», - говорит Винни-Пух’.
    - |
         ‘Дедушка говорит: «Смейтесь-смейтесь», - говорит’.
  examples_translation_english:
    - |
         ‘Well, say it the way you can’.
    - |
         ‘“It seems that I have lost weight, pull me out now”, — says Winnie-the-Pooh’.
    - |
         ‘Grandfather says: “Laugh, laugh”, — he says’.
  examples_sources:
    - |
         [Корпус: “Акпарс”, 29]
    - |
         [Корпус: “Пересказ мультфильма о Винни-Пухе”, 79]
    - |
         [Корпус: “Смешной случай”, 19]
